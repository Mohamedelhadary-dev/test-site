<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MedQuest — Scroll & Study</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#0B0B0F;
    --surface:#16161D;
    --surface-2:#1E1E27;
    --accent-a:#00F5A0;
    --accent-b:#6236FF;
    --grad: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    --danger:#FF3B5C;
    --ok:#00F5A0;
    --text:#F5F5F7;
    --text-dim:#8A8A93;
    --divider: rgba(255,255,255,0.08);
    --frame-w: 430px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:#000;}
body{
    font-family:'Inter',sans-serif; color:var(--text);
    display:flex; justify-content:center; align-items:stretch;
    min-height:100vh; background:#000;
}
h1,h2,h3,.display{ font-family:'Space Grotesk',sans-serif; }
.mono{ font-family:'JetBrains Mono',monospace; }

/* Phone frame */
#frame{
    width:100%; max-width:var(--frame-w); min-height:100vh;
    background:var(--bg); position:relative; overflow:hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
}

/* ---------- Centered (non-feed) screens ---------- */
.center-screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    justify-content:center; padding:32px; z-index:5; background:var(--bg);
}
.eyebrow{
    display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700;
    letter-spacing:1.5px; text-transform:uppercase; color:var(--accent-a); margin-bottom:14px;
}
.eyebrow::before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--grad); }

.title-hero{ font-size:34px; font-weight:700; line-height:1.1; margin:0 0 6px; }
.sub{ color:var(--text-dim); font-size:14px; margin:0 0 28px; }

input.field{
    width:100%; padding:16px 18px; border-radius:16px; border:1px solid var(--divider);
    background:var(--surface); color:var(--text); font-size:15px; font-family:'Inter';
    margin-bottom:14px; outline:none;
}
input.field:focus{ border-color:var(--accent-a); }
input.field::placeholder{ color:var(--text-dim); }

.btn{
    width:100%; padding:16px; border:none; border-radius:16px; font-weight:700; font-size:14px;
    letter-spacing:0.3px; cursor:pointer; margin-bottom:10px; font-family:'Inter';
    color:#05130E; background:var(--grad);
}
.btn.ghost{
    background:transparent; color:var(--text); border:1px solid var(--divider);
}
.btn:active{ transform:scale(0.98); }
.track-list{ display:flex; flex-direction:column; gap:10px; }

/* ---------- Feed ---------- */
#app{ position:absolute; inset:0; display:none; }
#feed{
    height:100%; overflow-y:scroll; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
}
#feed::-webkit-scrollbar{ display:none; }
.slide{
    height:100%; width:100%; scroll-snap-align:start; scroll-snap-stop:always;
    display:flex; flex-direction:column; justify-content:center;
    padding:90px 22px 30px; position:relative;
}
.slide::before{
    content:""; position:absolute; inset:0;
    background: radial-gradient(circle at 85% 15%, rgba(98,54,255,0.20), transparent 55%),
                radial-gradient(circle at 10% 85%, rgba(0,245,160,0.12), transparent 50%);
    pointer-events:none;
}
.q-topic{
    align-self:flex-start; font-size:11px; font-weight:700; color:var(--accent-a);
    text-transform:uppercase; letter-spacing:1.2px; background:rgba(0,245,160,0.1);
    padding:5px 10px; border-radius:20px; margin-bottom:16px; z-index:1;
}
.q-count{ color:var(--text-dim); font-weight:500; margin-right:6px; }
.q-text{ font-size:23px; font-weight:700; line-height:1.35; margin:0 0 26px; z-index:1; }

.opt{
    padding:16px 18px; border-radius:16px; border:1px solid var(--divider);
    background:var(--surface); font-weight:600; font-size:14.5px; margin-bottom:10px;
    z-index:1; transition:all .15s ease; position:relative;
}
.opt .letter{ color:var(--text-dim); font-weight:700; margin-right:10px; }
.opt.pick{ border-color:var(--accent-b); background:var(--surface-2); }
.opt.correct{ border-color:var(--ok); background:rgba(0,245,160,0.12); color:var(--ok); }
.opt.wrong{ border-color:var(--danger); background:rgba(255,59,92,0.12); color:var(--danger); }
.opt.locked{ pointer-events:none; }

.feedback{
    z-index:1; margin-top:8px; max-height:0; overflow:hidden; opacity:0;
    transition: max-height .35s ease, opacity .35s ease;
}
.feedback.show{ max-height:400px; opacity:1; margin-top:14px; }
.feedback-inner{
    background:var(--surface); border-left:3px solid var(--accent-a); border-radius:12px;
    padding:14px 16px; font-size:13.5px; color:var(--text-dim); line-height:1.5;
}
.feedback-inner b{ color:var(--text); }
.ref-link{ display:inline-block; margin-top:10px; font-size:12px; font-weight:700; color:var(--accent-a); text-decoration:none; }
.scroll-hint{
    z-index:1; display:flex; align-items:center; gap:6px; margin-top:16px;
    color:var(--text-dim); font-size:12px; font-weight:600; opacity:0; transition:opacity .3s;
}
.scroll-hint.show{ opacity:1; animation:bob 1.6s ease-in-out infinite; }
@keyframes bob{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-4px);} }

/* Fixed chrome over the feed */
#topbar{
    position:absolute; top:0; left:0; right:0; padding:16px 18px; z-index:10;
    display:flex; flex-direction:column; gap:8px; pointer-events:none;
}
#barTrack{ height:3px; width:100%; background:var(--divider); border-radius:3px; overflow:hidden; }
#barFill{ height:100%; width:0%; background:var(--grad); transition:width .3s ease; }
#topmeta{ display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); font-weight:600; }

#rail{
    position:absolute; right:12px; bottom:120px; z-index:10;
    display:flex; flex-direction:column; align-items:center; gap:20px;
}
.rail-btn{
    width:46px; height:46px; border-radius:50%; background:var(--surface);
    border:1px solid var(--divider); display:flex; align-items:center; justify-content:center;
    font-size:20px; cursor:pointer;
}
.rail-btn.active{ background:var(--grad); }
.rail-label{ font-size:10px; color:var(--text-dim); font-weight:700; margin-top:-14px; }
#streakNum{ font-family:'JetBrains Mono'; font-weight:700; font-size:13px; margin-top:-14px; }

#finishFloat{
    position:absolute; left:22px; right:22px; bottom:24px; z-index:10; display:none;
}

/* Results reel reuses .slide styling */
.score-ring{
    width:150px; height:150px; border-radius:50%; margin:10px auto 20px; position:relative;
    background:conic-gradient(var(--accent-a) calc(var(--pct,0)*1%), var(--surface) 0);
    display:flex; align-items:center; justify-content:center; z-index:1;
}
.score-ring::after{
    content:""; position:absolute; inset:8px; border-radius:50%; background:var(--bg);
}
.score-ring span{ position:relative; z-index:2; font-family:'Space Grotesk'; font-weight:700; font-size:30px; }
.center-txt{ text-align:center; z-index:1; }
.pill{
    display:inline-block; padding:6px 14px; border-radius:20px; background:var(--surface);
    font-size:12px; font-weight:700; color:var(--accent-a); margin-top:8px; z-index:1;
}
</style>
</head>
<body>
<div id="frame">

    <!-- LOGIN -->
    <div id="screen-login" class="center-screen">
        <div class="eyebrow">Board review · reel mode</div>
        <h1 class="title-hero">Scroll into<br>your next rotation.</h1>
        <p class="sub">One question per screen. Swipe up, lock in, keep the streak alive.</p>
        <input id="username" class="field" placeholder="Doctor's name">
        <div class="track-list">
            <button class="btn" onclick="navTo('med')">Medicine track</button>
            <button class="btn ghost" onclick="navTo('dentist')">Dentist track</button>
            <button class="btn ghost" onclick="startQuiz('pharma')">Pharmacy track</button>
        </div>
    </div>

    <!-- MODE -->
    <div id="screen-mode" class="center-screen" style="display:none">
        <div class="eyebrow">Pick a module</div>
        <h1 class="title-hero">How deep are<br>we going?</h1>
        <div class="track-list" style="margin-top:10px">
            <button class="btn" onclick="startSub('academic')">Basic sciences</button>
            <button class="btn ghost" onclick="startSub('clinical')">Clinical rotations</button>
        </div>
    </div>

    <!-- FEED APP -->
    <div id="app">
        <div id="topbar">
            <div id="barTrack"><div id="barFill"></div></div>
            <div id="topmeta"><span id="metaCount">Q1 / 10</span><span id="metaTimer" class="mono">00:00</span></div>
        </div>

        <div id="rail">
            <div>
                <div class="rail-btn" id="railBookmark" onclick="toggleBookmark()">☆</div>
            </div>
            <div>
                <div class="rail-btn">🔥</div>
                <div id="streakNum" class="mono" style="text-align:center">0</div>
            </div>
        </div>

        <div id="feed"></div>

        <div id="finishFloat">
            <button class="btn" onclick="scrollToResults()">See my results →</button>
        </div>
    </div>

</div>

<script>
/* ============ QUESTION BANKS (unchanged) ============ */
const banks = {

        {q:"Which embryonic stage enters the uterine cavity?", opt:["Zygote","Morula","Blastocyst","Fetus"], ans:1, topic:"Embryology", ex:"Morula typically enters on Day 4.", weak:"Inaccurate developmental timeline.", rev:["Day 1: Zygote","Day 4: Morula","Day 5: Blastocyst"], ref:"https://pubmed.ncbi.nlm.nih.gov/embryology-timeline/"},
        {q:"Derivation of the vertebral column?", opt:["Sclerotome","Myotome","Dermatome","Endoderm"], ans:0, topic:"Somites", ex:"Sclerotome forms bone and cartilage.", weak:"Weakness in somite differentiation.", rev:["Sclerotome = Bone","Myotome = Muscle"], ref:"#"},
        {q:"Genotype of Klinefelter Syndrome?", opt:["45,X","47,XXY","47,XYY","47,XXX"], ans:1, topic:"Genetics", ex:"Presence of an extra X chromosome in males.", weak:"Chromosomal aneuploidy confusion.", rev:["Klinefelter = XXY","Turner = X0"], ref:"https://www.nhs.uk/conditions/klinefelters-syndrome/"},
        {q:"Primary villi consist of?", opt:["Syncytiotrophoblast and Cytotrophoblast","Cytotrophoblast and Mesoderm","Syncytiotrophoblast only","Mesoderm and Vessels"], ans:0, topic:"Placental Histology", ex:"Primary villi have no mesodermal core yet.", weak:"Weak in placental development stages.", rev:["Primary = 2 layers","Secondary = +Mesoderm","Tertiary = +Vessels"], ref:"#"},
        {q:"Start of spermatogenesis?", opt:["At Birth","At Puberty","Intrauterine","Age 7"], ans:1, topic:"Endocrinology", ex:"Triggered by GnRH at puberty.", weak:"Trigger timing error.", rev:["Male = Puberty","Female = Prenatal"], ref:"#"},
        {q:"Example of a Diploid (2n) cell:", opt:["Oogonium","Secondary Oocyte","Mature Ovum","Spermatid"], ans:0, topic:"Cell Bio", ex:"Oogonia are pre-meiotic and diploid.", weak:"Ploidy classification error.", rev:["-Gonia = Diploid","-Oocyte/Tid = Haploid"], ref:"#"},
        {q:"Cranial-most structure in the early embryo?", opt:["Septum Transversum","Forebrain","Heart","Prochordal Plate"], ans:1, topic:"Orientation", ex:"Folding puts the forebrain most cranial.", weak:"Anatomical orientation error.", rev:["Forebrain position vs Heart"], ref:"#"},
